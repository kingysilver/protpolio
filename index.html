<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taste Archive Portfolio</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <!-- INTRO -->
  <section class="section intro">
    <h1>HOW DO WE TASTE VISUALLY?</h1>
    <p>Poster · Video · Goods<br/>하나의 맛을 세 가지 언어로 기록하다</p>
  </section>

  <!-- POSTER -->
  <section class="section poster">
    <div class="text">
      <h2>FOOD POSTER</h2>
      <p>시각적으로 맛을 압축하다</p>
    </div>
    <div class="media">
      <img src="poster.jpg" alt="poster">
    </div>
  </section>

  <!-- VIDEO -->
  <section class="section video">
    <video autoplay muted loop>
      <source src="video.mp4" type="video/mp4">
    </video>
    <div class="overlay">
      <h2>MOTION FLAVOR STUDY</h2>
      <p>맛을 시간으로 기록하다</p>
    </div>
  </section>

  <!-- GOODS -->
  <section class="section goods">
    <h2>FLAVOR OBJECTS</h2>
    <div class="grid">
      <img src="goods1.jpg" />
      <img src="goods2.jpg" />
      <img src="goods3.jpg" />
    </div>
    <p>경험을 손에 쥐는 형태로 확장하다</p>
  </section>

  <!-- CONTACT -->
  <section class="section contact">
    <h2>CONTACT</h2>
    <p>email: yourmail@gmail.com</p>
    <p>instagram: @yourid</p>
  </section>

  <script src="script.js"></script>
</body>
</html>
